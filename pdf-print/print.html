<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>PDF 打印预览</title>
  <style>
    #loading {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: #646a73;
      font-size: 15px;
      gap: 10px;
    }
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid #e5e6eb;
      border-top-color: #3370ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media print {
      #loading { display: none; }
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    正在加载文档，请稍候...
  </div>
  <script>
    (async function () {
      const params = new URLSearchParams(location.search);
      const key = params.get('key');
      const title = params.get('title') || '飞书文档';

      if (!key) {
        document.getElementById('loading').textContent = '参数错误';
        return;
      }

      let html = null;
      try {
        const data = await chrome.storage.session.get(key);
        html = data[key];
        // Clean up immediately after reading
        await chrome.storage.session.remove(key);
      } catch (e) {
        document.getElementById('loading').textContent = '读取文档失败：' + e.message;
        return;
      }

      if (!html) {
        document.getElementById('loading').textContent = '文档内容已过期，请重新导出';
        return;
      }

      document.title = title;

      // Extract <style> blocks and <body> content from the HTML string
      const styleMatches = [...html.matchAll(/<style[^>]*>([\s\S]*?)<\/style>/gi)];
      const styles = styleMatches.map((m) => m[1]).join('\n');

      const bodyMatch = html.match(/<body[^>]*>([\s\S]*?)<\/body>/i);
      const bodyContent = bodyMatch ? bodyMatch[1] : html;

      // Inject styles into current document head
      if (styles) {
        const styleEl = document.createElement('style');
        styleEl.textContent = styles;
        document.head.appendChild(styleEl);
      }

      // Replace body content
      document.getElementById('loading').remove();
      document.body.innerHTML = bodyContent;

      // Trigger print dialog after rendering
      setTimeout(() => window.print(), 800);
    })();
  </script>
</body>
</html>
