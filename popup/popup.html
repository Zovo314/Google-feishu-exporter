<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 16px;
      color: #1f2329;
      background: #fff;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .header h1 {
      font-size: 15px;
      font-weight: 600;
    }
    .header .logo {
      width: 24px;
      height: 24px;
    }
    .status {
      font-size: 13px;
      color: #646a73;
      margin-bottom: 12px;
      min-height: 20px;
      line-height: 20px;
    }
    .status.error { color: #d83931; }
    .status.success { color: #34a853; }
    .progress-bar {
      width: 100%;
      height: 4px;
      background: #e5e6eb;
      border-radius: 2px;
      margin-bottom: 12px;
      overflow: hidden;
      display: none;
    }
    .progress-bar.active { display: block; }
    .progress-bar .fill {
      height: 100%;
      background: #3370ff;
      border-radius: 2px;
      transition: width 0.3s ease;
      width: 0%;
    }
    .options {
      margin-bottom: 12px;
    }
    .options label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: #646a73;
      cursor: pointer;
    }
    .options input[type="checkbox"] {
      accent-color: #3370ff;
    }
    .format-label {
      font-size: 12px;
      color: #8f959e;
      margin-bottom: 6px;
    }
    .format-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      margin-bottom: 12px;
    }
    .format-btn {
      padding: 6px 4px;
      font-size: 12px;
      font-weight: 500;
      color: #646a73;
      background: #f4f5f7;
      border: 1.5px solid transparent;
      border-radius: 6px;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
      line-height: 1.4;
    }
    .format-btn:hover {
      background: #e8ecff;
      color: #3370ff;
    }
    .format-btn.active {
      background: #e8ecff;
      border-color: #3370ff;
      color: #3370ff;
    }
    .format-btn .fmt-icon { display: block; font-size: 16px; margin-bottom: 2px; }
    #exportBtn {
      width: 100%;
      padding: 8px 16px;
      font-size: 14px;
      font-weight: 500;
      color: #fff;
      background: #3370ff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
    }
    #exportBtn:hover { background: #2860e1; }
    #exportBtn:disabled {
      background: #bbbfc4;
      cursor: not-allowed;
    }
    .pdf-tip {
      font-size: 11px;
      color: #8f959e;
      margin-top: 8px;
      display: none;
      line-height: 1.5;
    }
    .pdf-tip.show { display: block; }
  </style>
</head>
<body>
  <div class="header">
    <img class="logo" src="../icons/icon48.png" alt="">
    <h1>飞书文档导出</h1>
  </div>
  <div class="status" id="status">准备就绪</div>
  <div class="progress-bar" id="progressBar">
    <div class="fill" id="progressFill"></div>
  </div>
  <div class="options">
    <label>
      <input type="checkbox" id="includeImages" checked>
      内联图片（base64，离线可用）
    </label>
  </div>
  <div class="format-label">选择导出格式</div>
  <div class="format-grid">
    <button class="format-btn active" data-format="html">
      <span class="fmt-icon">🌐</span>HTML
    </button>
    <button class="format-btn" data-format="pdf">
      <span class="fmt-icon">📄</span>PDF
    </button>
    <button class="format-btn" data-format="word">
      <span class="fmt-icon">📝</span>Word
    </button>
    <button class="format-btn" data-format="markdown">
      <span class="fmt-icon">⬇️</span>MD
    </button>
  </div>
  <button id="exportBtn">导出为 HTML</button>
  <div class="pdf-tip" id="pdfTip">
    💡 PDF 导出将在新标签页打开文档，请在弹出的打印对话框中选择「另存为PDF」。
  </div>
  <script src="popup.js"></script>
</body>
</html>
